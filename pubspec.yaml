name: travel_planner
description: Flutter Apprentice Final Project - Travel & Event Planner
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  #state management (riverpod)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # navigation
  go_router: ^14.2.0

  # networking (chopper)
  chopper: ^8.0.0
  logging: ^1.2.0

  # JSON Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Local DB (Drift/SQLite)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1

  # shared Preferences
  shared_preferences: ^2.3.1
  # Maps
  google_maps_flutter: ^2.9.0

  uuid: ^4.4.2
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  chopper_generator: ^8.0.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0
